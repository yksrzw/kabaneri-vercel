function binomialLogLik(hits, trials, p) {
  if (p <= 0 || p >= 1 || trials <= 0) return 0;
  return hits * Math.log(p) + (trials - hits) * Math.log(1 - p);
}

function dampen(hits, trials, maxTrials = 2000) {
  if (trials <= maxTrials) return { h: hits, t: trials };
  const ratio = hits / trials;
  return { h: Math.round(ratio * maxTrials), t: maxTrials };
}

function loadMachineData(storageKey, getDefault) {
  try {
    const raw = localStorage.getItem(storageKey);
    if (raw) {
      const saved = JSON.parse(raw);
      const defaults = getDefault();
      const merged = { ...defaults, ...saved };
      for (const key of Object.keys(defaults)) {
        if (defaults[key] && typeof defaults[key] === "object" && !Array.isArray(defaults[key])) {
          merged[key] = { ...defaults[key], ...(saved[key] || {}) };
        }
      }
      return merged;
    }
  } catch {}
  return null;
}

function saveMachineData(storageKey, data) {
  try { localStorage.setItem(storageKey, JSON.stringify(data)); } catch {}
}

function logLikToProbs(logLik) {
  const validLogLiks = logLik.filter(x => x > -Infinity);
  if (validLogLiks.length === 0) {
    return [1,2,3,4,5,6].map(s => ({ setting: s, score: 0, pct: 16.7 }));
  }
  const maxLL = Math.max(...validLogLiks);
  const likelihoods = logLik.map(ll => ll === -Infinity ? 0 : Math.exp(ll - maxLL));
  const totalLik = likelihoods.reduce((a, b) => a + b, 0);
  if (totalLik === 0) {
    return [1,2,3,4,5,6].map(s => ({ setting: s, score: 0, pct: 16.7 }));
  }
  return likelihoods.map((lik, i) => ({
    setting: i + 1,
    score: lik,
    pct: parseFloat((lik / totalLik * 100).toFixed(1))
  }));
}

    else if (state.trophies.gold > 0 || state.kabaneriAtk.atk44 > 0 || state.specialDisplay.disp456 > 0 || state.omikuji.chukichi > 0 || state.charas.biba > 0) c = 4;
    else if (state.trophies.silver > 0) c = 3;
    else if (state.trophies.bronze > 0 || state.omikuji.shokichi > 0 || state.voices.mumei_special > 0) c = 2;
    return c;
  },

  getQuickStats(state) {

  estimateSettings(state) {
    const P = this.SETTINGS_PROBABILITIES;
    const logLik = [0, 0, 0, 0, 0, 0];
    let hasAnyData = false;

    // A1. 初当り確率
    if (state.normalGames >= 50 && state.bonusCount > 0) {
      hasAnyData = true;
      const { h, t } = dampen(state.bonusCount, state.normalGames);
      P.initialHit.forEach((s, i) => { logLik[i] += binomialLogLik(h, t, 1 / s.val); });
    }
    // A2. ST確率
    if (state.normalGames >= 50 && state.stCount > 0) {
      hasAnyData = true;
      const { h, t } = dampen(state.stCount, state.normalGames);
      P.st.forEach((s, i) => { logLik[i] += binomialLogLik(h, t, 1 / s.val); });
    }
    // A3. 下段ベル確率
    if (state.totalGames >= 50 && state.shimoBellCount > 0) {
      hasAnyData = true;
      const { h, t } = dampen(state.shimoBellCount, state.totalGames);
      P.shimoBell.forEach((s, i) => { logLik[i] += binomialLogLik(h, t, 1 / s.val); });
    }
    // A4. CZ確率
    const czRefVals = [251.5, 246.3, 241.1, 235.9, 230.7, 225.5];
    if (state.normalGames >= 50 && state.czCount > 0) {
      hasAnyData = true;
      const { h, t } = dampen(state.czCount, state.normalGames);
      czRefVals.forEach((v, i) => { logLik[i] += binomialLogLik(h, t, 1 / v); });
    }

    // B. 確定演出
    let hardMin = 0;
    if (state.trophies.bronze > 0) hardMin = Math.max(hardMin, 1);
    if (state.trophies.silver > 0) hardMin = Math.max(hardMin, 2);
    if (state.trophies.gold > 0) hardMin = Math.max(hardMin, 3);
    if (state.trophies.kirin > 0) hardMin = Math.max(hardMin, 4);
    if (state.trophies.rainbow > 0) hardMin = Math.max(hardMin, 5);
    if (state.kabaneriAtk.atk44 > 0) hardMin = Math.max(hardMin, 3);
    if (state.kabaneriAtk.atk55 > 0) hardMin = Math.max(hardMin, 4);
    if (state.kabaneriAtk.atk66 > 0 || state.kabaneriAtk.atk77 > 0) hardMin = Math.max(hardMin, 5);
    if (state.specialDisplay.disp456 > 0) hardMin = Math.max(hardMin, 3);
    if (state.specialDisplay.disp666 > 0) hardMin = Math.max(hardMin, 5);
    if (state.omikuji.shokichi > 0) hardMin = Math.max(hardMin, 1);
    if (state.omikuji.chukichi > 0) hardMin = Math.max(hardMin, 3);
    if (state.omikuji.daikichi > 0) hardMin = Math.max(hardMin, 5);
    if (state.voices.mumei_special > 0) hardMin = Math.max(hardMin, 1);
    if (state.voices.no_voice > 0) hardMin = Math.max(hardMin, 4);
    if (state.stEndScreens.mizugi > 0) hardMin = Math.max(hardMin, 5);
    if (state.charas.biba > 0) hardMin = Math.max(hardMin, 3);
    if (hardMin > 0) { hasAnyData = true; for (let i = 0; i < hardMin; i++) logLik[i] = -Infinity; }

    // C1. ボイス奇偶
    const mfVoiceTotal = state.voices.male + state.voices.female;
    if (mfVoiceTotal >= 5) {
      hasAnyData = true;
      const voiceMaleRatios = [0.50, 0.42, 0.50, 0.42, 0.50, 0.42];
      const { h, t } = dampen(state.voices.male, mfVoiceTotal, 200);
      voiceMaleRatios.forEach((mr, i) => { logLik[i] += binomialLogLik(h, t, mr); });
    }
    // C2. 景之ボイス出現率
    const totalVoice = Object.values(state.voices).reduce((a, b) => a + b, 0);
    if (totalVoice >= 5) {
      const kagenoWeakRates = [0.103, 0.110, 0.120, 0.135, 0.150, 0.172];
      const kwCount = state.voices.kageno_weak;
      if (kwCount > 0 || totalVoice >= 20) {
        const { h, t } = dampen(kwCount, totalVoice, 300);
        kagenoWeakRates.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
      }
      const kmCount = state.voices.kageno_mid;
      if (kmCount > 0) {
        hasAnyData = true;
        const kagenoMidRates = [0.009, 0.010, 0.011, 0.013, 0.015, 0.018];
        const { h, t } = dampen(kmCount, totalVoice, 300);
        kagenoMidRates.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
      }
      const ksCount = state.voices.kageno_strong;
      if (ksCount > 0) {
        hasAnyData = true;
        const kagenoStrongRates = [0.001, 0.001, 0.002, 0.003, 0.004, 0.006];
        const { h, t } = dampen(ksCount, totalVoice, 300);
        kagenoStrongRates.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
      }
    }
    // C3. キャラ紹介 奇偶
    const mfCharaTotal = state.charas.male_chara + state.charas.female_chara;
    if (mfCharaTotal >= 5) {
      hasAnyData = true;
      const charaFemaleRatios = [0.50, 0.58, 0.45, 0.58, 0.45, 0.61];
      const { h, t } = dampen(state.charas.female_chara, mfCharaTotal, 200);
      charaFemaleRatios.forEach((fr, i) => { logLik[i] += binomialLogLik(h, t, fr); });
    }
    // C4. ST終了画面
    const totalScreens = Object.values(state.stEndScreens).reduce((a, b) => a + b, 0);
    if (totalScreens >= 3) {
      hasAnyData = true;
      const hanamiRates = [0.035, 0.037, 0.039, 0.042, 0.045, 0.048];
      const { h, t } = dampen(state.stEndScreens.hanami, totalScreens, 200);
      hanamiRates.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
    }
    // C5. アイテムくじ
    const totalOmikuji = Object.values(state.omikuji).reduce((a, b) => a + b, 0);
    if (totalOmikuji >= 3) {
      hasAnyData = true;
      const ayameRates = [0.036, 0.045, 0.055, 0.075, 0.100, 0.134];
      const { h, t } = dampen(state.omikuji.ayame_yumi, totalOmikuji, 200);
      ayameRates.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
    }
    if (totalOmikuji >= 3 && state.omikuji.miyama > 0) {
      hasAnyData = true;
      const miyamaRates = [0.005, 0.006, 0.008, 0.010, 0.014, 0.018];
      const { h, t } = dampen(state.omikuji.miyama, totalOmikuji, 200);
      miyamaRates.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
    }
    // C6. 3周期目ボーナス
    const cycle3NormalTotal = state.cycleBonus.cycle3_normal_hit + state.cycleBonus.cycle3_normal_miss;
    if (cycle3NormalTotal >= 1) {
      hasAnyData = true;
      const cycle3NormalRates = [0.05, 0.10, 0.15, 0.25, 0.35, 0.45];
      cycle3NormalRates.forEach((r, i) => { logLik[i] += binomialLogLik(state.cycleBonus.cycle3_normal_hit, cycle3NormalTotal, r); });
    }
    const cycle3ShortTotal = state.cycleBonus.cycle3_short_hit + state.cycleBonus.cycle3_short_miss;
    if (cycle3ShortTotal >= 1) {
      hasAnyData = true;
      const cycle3ShortRates = [0.40, 0.45, 0.50, 0.55, 0.65, 0.75];
      cycle3ShortRates.forEach((r, i) => { logLik[i] += binomialLogLik(state.cycleBonus.cycle3_short_hit, cycle3ShortTotal, r); });
    }
    // C7. 景之STループ率
    const kagenoLoopTotal = state.kagenoLoop.kageno_loop_yes + state.kagenoLoop.kageno_loop_no;
    if (kagenoLoopTotal >= 1) {
      hasAnyData = true;
      const loopRates = [0.15, 0.20, 0.25, 0.35, 0.45, 0.55];
      loopRates.forEach((r, i) => { logLik[i] += binomialLogLik(state.kagenoLoop.kageno_loop_yes, kagenoLoopTotal, r); });
    }

    if (!hasAnyData) return [1,2,3,4,5,6].map(s => ({ setting: s, score: 0, pct: 16.7 }));
    return logLikToProbs(logLik);
  },

  generateMemoText(state, estimation, confirmedMin) {

    lines.push("CZ: " + state.czCount + "\u56DE (" + fmtProb(state.czCount, state.normalGames) + ")");

    // ST end screens

    // Special display

    // Omikuji
    const omikujiLabels = { tsuranuki: "\u30C4\u30E9\u30CC\u30AD\u7B52", mumei_gun: "\u7121\u540D\u306E\u77ED\u9283", jiketsu: "\u81EA\u6C7A\u888B", kurusu_katana: "\u6765\u6816\u306E\u5200", mumei_kendama: "\u7121\u540D\u306E\u3051\u3093\u7389", ayame_yumi: "\u83D6\u84B2\u306E\u5F13", miyama: "\u30DF\u30E4\u30DE\u30AB\u30E9\u30B9\u30A2\u30B2\u30CF", shokichi: "\u5C0F\u5409", chukichi: "\u4E2D\u5409", daikichi: "\u5927\u5409" };
    const oe = Object.entries(state.omikuji).filter(([,v]) => v > 0);
    if (oe.length > 0) { const totalO = Object.values(state.omikuji).reduce((a,b)=>a+b,0); lines.push("\u2500\u2500 \u30A2\u30A4\u30C6\u30E0\u304F\u3058 (\u8A08" + totalO + "\u56DE) \u2500\u2500"); oe.forEach(([k,v]) => { lines.push("  " + omikujiLabels[k] + ": " + v + "\u56DE (" + (v/totalO*100).toFixed(1) + "%)"); }); lines.push(""); }

    else if (state.trophies.silver > 0) c = 3;

  getQuickStats(state) {
    const fmtP = (d, h) => d > 0 && h > 0 ? (d / h).toFixed(1) : "---";
    const tengTotal = state.tengekiSuccess + state.tengekiFail;
    const tengRate = tengTotal > 0 ? (state.tengekiSuccess / tengTotal * 100).toFixed(1) + "%" : "---";
    return [
      { label: "\u901A\u5E38G\u6570", value: String(state.normalGames), color: "#fff", prefix: "" },
      { label: "AT\u521D\u5F53\u308A", value: fmtP(state.normalGames, state.atCount), color: "#4a9eff", prefix: "1/" },
      { label: "\u5929\u7834\u306E\u523B", value: fmtP(state.normalGames, state.tenhaCount), color: "#2ecc71", prefix: "1/" },
      { label: "\u5929\u6483\u7387", value: tengRate, color: "#e67e22", prefix: "" }
    ];
  },

  estimateSettings(state) {
    const P = this.SETTINGS_PROBABILITIES;
    const logLik = [0, 0, 0, 0, 0, 0];
    let hasAnyData = false;

    // A1. AT初当たり確率
    if (state.normalGames >= 50 && state.atCount > 0) {
      hasAnyData = true;
      const { h, t } = dampen(state.atCount, state.normalGames);
      P.atFirstHit.forEach((s, i) => { logLik[i] += binomialLogLik(h, t, 1 / s.val); });
    }

    // A2. 天破の刻突入率
    if (state.normalGames >= 50 && state.tenhaCount > 0) {
      hasAnyData = true;
      const { h, t } = dampen(state.tenhaCount, state.normalGames);
      P.tenhaEntry.forEach((s, i) => { logLik[i] += binomialLogLik(h, t, 1 / s.val); });
    }

    // A3. 天撃成功率
    const tengTotal = state.tengekiSuccess + state.tengekiFail;
    if (tengTotal >= 3) {
      hasAnyData = true;
      const { h, t } = dampen(state.tengekiSuccess, tengTotal, 500);
      this.TENGEKI_RATES.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
    }

    // A4. 256あべし以内選択率
    const abeshiTotal = state.abeshi256Hit + state.abeshi256Miss;
    if (abeshiTotal >= 3) {
      hasAnyData = true;
      const { h, t } = dampen(state.abeshi256Hit, abeshiTotal, 500);
      this.ABESHI_256_RATES.forEach((r, i) => { logLik[i] += binomialLogLik(h, t, r); });
    }

    // B. 確定演出 (hard evidence)
    let hardMin = 0;
    // Trophy
    if (state.trophies.bronze > 0) hardMin = Math.max(hardMin, 1);
    if (state.trophies.silver > 0) hardMin = Math.max(hardMin, 2);
    if (state.trophies.gold > 0) hardMin = Math.max(hardMin, 3);
    if (state.trophies.kirin > 0) hardMin = Math.max(hardMin, 4);
    if (state.trophies.rainbow > 0) hardMin = Math.max(hardMin, 5);

    // 枠ランプ - hard evidence
    if (state.wakuLamp.yellow_green_on > 0) hardMin = Math.max(hardMin, 1);
    if (state.wakuLamp.yellow_green_blink > 0) hardMin = Math.max(hardMin, 3);
    if (state.wakuLamp.gold_lamp > 0) hardMin = Math.max(hardMin, 5);

    if (hardMin > 0) { hasAnyData = true; for (let i = 0; i < hardMin; i++) logLik[i] = -Infinity; }

    // C. 枠ランプ - setting elimination (白点灯/白点滅)
    const wOn = state.wakuLamp.white_on > 0;
    const wBlink = state.wakuLamp.white_blink > 0;
    if (wOn && !wBlink) {
      // 設定2 or 4のみ → S1,S3,S5,S6を除外
      hasAnyData = true;
      [0, 2, 4, 5].forEach(i => { logLik[i] = -Infinity; });
    } else if (wBlink && !wOn) {
      // 設定3 or 5のみ → S1,S2,S4,S6を除外
      hasAnyData = true;
      [0, 1, 3, 5].forEach(i => { logLik[i] = -Infinity; });
    } else if (wOn && wBlink) {
      // 両方出現 → S1, S6のみ除外
      hasAnyData = true;
      [0, 5].forEach(i => { logLik[i] = -Infinity; });
    }

    // D. 枠ランプ - soft evidence (シアン)
    if (state.wakuLamp.cyan_on > 0) {
      hasAnyData = true;
      const cyanOnBoost = [0, 0, 0, 0.5, 0.8, 1.0];
      cyanOnBoost.forEach((b, i) => { logLik[i] += b * state.wakuLamp.cyan_on; });
    }
    if (state.wakuLamp.cyan_blink > 0) {
      hasAnyData = true;
      const cyanBlinkBoost = [0, 0, 0, 1.0, 1.5, 2.0];
      cyanBlinkBoost.forEach((b, i) => { logLik[i] += b * state.wakuLamp.cyan_blink; });
    }

    if (!hasAnyData) return [1,2,3,4,5,6].map(s => ({ setting: s, score: 0, pct: 16.7 }));
    return logLikToProbs(logLik);
  },

    lines.push("");

    estimation.forEach(e => {

    lines.push("");

    lines.push("");
    // Trophies
    const trophyLabels = { bronze: "\u9285", silver: "\u9280", gold: "\u91D1", kirin: "\u30AD\u30EA\u30F3\u67C4", rainbow: "\u8679" };
    const te = Object.entries(state.trophies).filter(([,v]) => v > 0);

    // Waku lamp
    const lampLabels = { white_on: "\u767D\u70B9\u706F", white_blink: "\u767D\u70B9\u6EC5", cyan_on: "\u30B7\u30A2\u30F3\u70B9\u706F", cyan_blink: "\u30B7\u30A2\u30F3\u70B9\u6EC5", yellow_green_on: "\u9EC4\u7DD1\u70B9\u706F", yellow_green_blink: "\u9EC4\u7DD1\u70B9\u6EC5", gold_lamp: "\u91D1" };
    const le = Object.entries(state.wakuLamp).filter(([,v]) => v > 0);
    if (le.length > 0) { lines.push("\u2500\u2500 \u67A0\u30E9\u30F3\u30D7 \u2500\u2500"); le.forEach(([k,v]) => lines.push("  " + lampLabels[k] + ": " + v + "\u56DE")); lines.push(""); }
    if (state.memo && state.memo.trim()) { lines.push("\u2500\u2500 \u30E1\u30E2 \u2500\u2500"); lines.push(state.memo.trim()); lines.push(""); }
    lines.push("\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501");

  },

function MachineCounter({ machineId, onBack }) {

  const [activeTab, setActiveTab] = useState("counter");
  const [showReset, setShowReset] = useState(false);
  const [copied, setCopied] = useState(false);

  useEffect(() => { saveMachineData(config.storageKey, state); }, [state]);

  const update = useCallback((key, val) => {

          React.createElement("button", {
            onClick: onBack,
            style: { width: 36, height: 36, borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)",
              background: "rgba(255,255,255,0.05)", color: "#aaa", fontSize: 18,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }
          }, "\u2190"),
          React.createElement("div", null,
            React.createElement("div", { style: { fontSize: 11, color: config.accentColor, fontWeight: 700, letterSpacing: 2 } }, "SMARTSLOT"),
            React.createElement("div", { style: { fontSize: 17, fontWeight: 900, color: "#fff", lineHeight: 1.2 } }, config.name, " ", config.subtitle),
            React.createElement("div", { style: { fontSize: 10, color: "#888", marginTop: 2 } }, "\u8A2D\u5B9A\u63A8\u6E2C\u30AB\u30A6\u30F3\u30BF\u30FC")
          )
        ),
        React.createElement("button", {
          onClick: () => setShowReset(true),
          style: { padding: "6px 12px", borderRadius: 6, border: "1px solid " + config.accentColor,
            background: "transparent", color: config.accentColor, fontSize: 11, cursor: "pointer", fontWeight: 600 }
        }, "\u30EA\u30BB\u30C3\u30C8")
      ),
      // Quick stats bar
      React.createElement("div", { style: { display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" } },
        quickStats.map((qs, i) =>
          React.createElement("div", { key: i, style: quickStat },
            React.createElement("span", { style: { fontSize: 10, color: "#888" } }, qs.label),
            React.createElement("span", { style: { fontSize: i === 0 ? 16 : 14, fontWeight: i === 0 ? 800 : 700, color: qs.color, fontFamily: "monospace" } }, qs.prefix, qs.value)
          )
        )
      ),
      // Confirmed min banner
      confirmedMin > 1 && React.createElement("div", {
        style: { marginTop: 8, padding: "6px 12px", borderRadius: 8,
          background: confirmedMin >= 5 ? "rgba(231,76,60,0.2)" : "rgba(241,196,15,0.15)",
          border: "1px solid " + (confirmedMin >= 5 ? "#e74c3c" : "#f1c40f"),
          fontSize: 13, fontWeight: 700, textAlign: "center",
          color: confirmedMin >= 5 ? "#e74c3c" : "#f1c40f" }
      }, "\uD83D\uDD25 \u8A2D\u5B9A" + confirmedMin + "\u4EE5\u4E0A \u78BA\u5B9A\u6F14\u51FA\u3042\u308A")
    ),

    // ── Tab bar ──
    React.createElement("div", {
      style: { display: "flex", position: "sticky", top: 145, zIndex: 99, background: "#0a0a12", borderBottom: "1px solid #222" }
    },
      [{ key: "counter", label: "\uD83D\uDCCA \u30AB\u30A6\u30F3\u30C8" }, { key: "result", label: "\uD83C\uDFAF \u63A8\u6E2C\u7D50\u679C" }, { key: "ref", label: "\uD83D\uDCCB \u53C2\u7167\u8868" }].map(tab =>
        React.createElement("button", {
          key: tab.key, onClick: () => setActiveTab(tab.key),
          style: { flex: 1, padding: "10px 0", border: "none", cursor: "pointer",
            background: activeTab === tab.key ? "rgba(26,107,255,0.15)" : "transparent",
            color: activeTab === tab.key ? "#4a9eff" : "#666",
            borderBottom: activeTab === tab.key ? "2px solid #4a9eff" : "2px solid transparent",
            fontSize: 13, fontWeight: 700, transition: "0.2s" }
        }, tab.label)
      )
    ),

    // ── Tab content ──
    React.createElement("div", { style: { padding: "12px 10px" } },
      // Counter tab
      activeTab === "counter" && config.renderCounterTab(state, update, updateNested),

      // Result tab
      activeTab === "result" && React.createElement("div", null,
        // Big setting number
        React.createElement("div", {
          style: { textAlign: "center", padding: 20, background: "linear-gradient(135deg, #1a1a2e, #16213e)",
            borderRadius: 12, marginBottom: 16, border: "1px solid rgba(255,255,255,0.08)" }
        },
          React.createElement("div", { style: { fontSize: 12, color: "#888", marginBottom: 4 } }, "\u63A8\u6E2C\u8A2D\u5B9A"),
          React.createElement("div", {
            style: { fontSize: 56, fontWeight: 900, fontFamily: "'JetBrains Mono', monospace",
              color: settingColors[bestSetting.setting - 1],
              textShadow: "0 0 30px " + settingColors[bestSetting.setting - 1] + "44" }
          }, hasData ? bestSetting.setting : "?"),
          hasData && React.createElement("div", { style: { fontSize: 14, color: "#aaa", marginTop: 2 } },
            "\u78BA\u7387 ", React.createElement("strong", { style: { color: settingColors[bestSetting.setting - 1] } }, bestSetting.pct + "%")
          ),
          !hasData && React.createElement("div", { style: { fontSize: 12, color: "#666", marginTop: 4 } }, "\u30C7\u30FC\u30BF\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044"),
          confirmedMin > 1 && React.createElement("div", { style: { fontSize: 13, color: "#e74c3c", fontWeight: 700, marginTop: 4 } },
            "\u78BA\u5B9A\u6F14\u51FA: \u8A2D\u5B9A" + confirmedMin + "\u4EE5\u4E0A")
        ),
        // Probability distribution bars
        React.createElement("div", { style: { fontSize: 13, fontWeight: 700, color: "#aaa", marginBottom: 8 } }, "\u8A2D\u5B9A\u5225\u78BA\u7387\u5206\u5E03"),
        estimation.map((e, i) =>
          React.createElement("div", { key: i, style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 6 } },
            React.createElement("span", { style: { width: 32, fontSize: 14, fontWeight: 800, color: settingColors[i], textAlign: "center" } }, e.setting),
            React.createElement("div", { style: { flex: 1, height: 24, background: "#111", borderRadius: 6, overflow: "hidden", position: "relative" } },
              React.createElement("div", { style: { width: e.pct + "%", height: "100%", borderRadius: 6, transition: "width 0.5s",
                background: "linear-gradient(90deg, " + settingColors[i] + "88, " + settingColors[i] + ")" } }),
              React.createElement("span", { style: { position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", fontSize: 11, fontWeight: 700, color: "#fff" } }, e.pct + "%")
            )
          )
        ),
        // Machine-specific extras
        config.renderResultExtras(state, estimation),
        // Copy button
        React.createElement("button", {
          onClick: () => {
            const text = config.generateMemoText(state, estimation, confirmedMin);
            navigator.clipboard.writeText(text).then(() => {
              setCopied(true); setTimeout(() => setCopied(false), 2000);
            }).catch(() => {
              const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
              document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
              setCopied(true); setTimeout(() => setCopied(false), 2000);
            });
          },
          style: { width: "100%", marginTop: 20, padding: "14px 0", borderRadius: 10,
            border: copied ? "1px solid #2ecc71" : "1px solid rgba(26,107,255,0.4)",
            background: copied ? "rgba(46,204,113,0.15)" : "rgba(26,107,255,0.1)",
            color: copied ? "#2ecc71" : "#4a9eff", fontSize: 15, fontWeight: 700, cursor: "pointer", transition: "all 0.2s" }
        }, copied ? "\u2705 \u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F\uFF01" : "\uD83D\uDCCB \u5168\u30C7\u30FC\u30BF\u3092\u30AF\u30EA\u30C3\u30D7\u30DC\u30FC\u30C9\u306B\u30B3\u30D4\u30FC")
      ),

      // Reference tab
      activeTab === "ref" && config.renderRefTab()
    ),

    // ── Reset modal ──
    showReset && React.createElement("div", {
      style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 200,
        display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }

        React.createElement("div", { style: { display: "flex", gap: 10 } },

    )
  );
}

// ══════════════════════════════════════════════════════════════
// APP (Router)
// ══════════════════════════════════════════════════════════════
function App() {
  const [activeMachineId, setActiveMachineId] = useState(() => {
    try { return localStorage.getItem("slot_counter_last_machine") || null; } catch { return null; }
  });

  const handleSelect = (id) => {
    setActiveMachineId(id);
    try { localStorage.setItem("slot_counter_last_machine", id); } catch {}
  };

  const handleBack = () => {
    setActiveMachineId(null);
    try { localStorage.removeItem("slot_counter_last_machine"); } catch {}
  };

  if (!activeMachineId || !MACHINES[activeMachineId]) {
    return React.createElement(MachineSelector, { onSelect: handleSelect });
  }
  return React.createElement(MachineCounter, { key: activeMachineId, machineId: activeMachineId, onBack: handleBack });
}

// Mount
var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App, null));
</script>
