// ── localStorage helpers ──────────────────────────────────────
const STORAGE_KEY = "kabaneri_unato_counter_v1";
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Deep merge with defaults to handle schema changes (new keys added)
      const defaults = getDefaultState();
      const merged = {
        ...defaults,
        ...saved
      };
      for (const key of Object.keys(defaults)) {
        if (defaults[key] && typeof defaults[key] === "object" && !Array.isArray(defaults[key])) {
          merged[key] = {
            ...defaults[key],
            ...(saved[key] || {})
          };
        }
      }
      return merged;
    }
  } catch {}
  return null;
}
function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}

// ── Setting Estimation Logic (Bayesian-style) ─────────────────
// Each evidence source produces a log-likelihood for each setting.
// Probability evidence uses binomial likelihood with effective sample
// cap to prevent large-sample domination. Confirmed演出 uses hard cutoff.

function binomialLogLik(hits, trials, p) {
  if (p <= 0 || p >= 1 || trials <= 0) return 0;
  return hits * Math.log(p) + (trials - hits) * Math.log(1 - p);
}

// Cap effective sample size to prevent probability evidence from
// drowning out all other signals. Returns dampened (hits, trials).
function dampen(hits, trials, maxTrials = 2000) {
  if (trials <= maxTrials) return {
    h: hits,
    t: trials
  };
  const ratio = hits / trials;
  return {
    h: Math.round(ratio * maxTrials),
    t: maxTrials
  };
}
function estimateSettings(state) {
  const logLik = [0, 0, 0, 0, 0, 0]; // settings 1-6
  let hasAnyData = false;

  // ════════════════════════════════════════════════════════
  // A. Probability-based evidence (binomial likelihood)
  // ════════════════════════════════════════════════════════

  // ── A1. 初当り確率 ──
  if (state.normalGames >= 50 && state.bonusCount > 0) {
    hasAnyData = true;
    const {
      h,
      t
    } = dampen(state.bonusCount, state.normalGames);
    SETTINGS_PROBABILITIES.initialHit.forEach((s, i) => {
      logLik[i] += binomialLogLik(h, t, 1 / s.val);
    });
  }

  // ── A2. ST確率 ──
  if (state.normalGames >= 50 && state.stCount > 0) {
    hasAnyData = true;
    const {
      h,
      t
    } = dampen(state.stCount, state.normalGames);
    SETTINGS_PROBABILITIES.st.forEach((s, i) => {
      logLik[i] += binomialLogLik(h, t, 1 / s.val);
    });
  }

  // ── A3. 下段ベル確率 (totalGames基準 = 通常時+AT中) ──
  if (state.totalGames >= 50 && state.shimoBellCount > 0) {
    hasAnyData = true;
    const {
      h,
      t
    } = dampen(state.shimoBellCount, state.totalGames);
    SETTINGS_PROBABILITIES.shimoBell.forEach((s, i) => {
      logLik[i] += binomialLogLik(h, t, 1 / s.val);
    });
  }

  // ── A4. CZ確率 (normalGames基準 = 通常時のみ) ──
  // 実戦値: 設1 1/251.5, 設6 1/225.5
  const czRefVals = [251.5, 246.3, 241.1, 235.9, 230.7, 225.5];
  if (state.normalGames >= 50 && state.czCount > 0) {
    hasAnyData = true;
    const {
      h,
      t
    } = dampen(state.czCount, state.normalGames);
    czRefVals.forEach((v, i) => {
      logLik[i] += binomialLogLik(h, t, 1 / v);
    });
  }

  // ════════════════════════════════════════════════════════
  // B. 確定演出 (hard cutoff → 該当しない設定を除外)
  // ════════════════════════════════════════════════════════
  const {
    trophies
  } = state;
  let hardMin = 0; // 0-indexed: settings below this are impossible

  if (trophies.bronze > 0) hardMin = Math.max(hardMin, 1); // 設定2以上
  if (trophies.silver > 0) hardMin = Math.max(hardMin, 2); // 設定3以上
  if (trophies.gold > 0) hardMin = Math.max(hardMin, 3); // 設定4以上
  if (trophies.kirin > 0) hardMin = Math.max(hardMin, 4); // 設定5以上
  if (trophies.rainbow > 0) hardMin = Math.max(hardMin, 5); // 設定6

  if (state.kabaneriAtk.atk44 > 0) hardMin = Math.max(hardMin, 3);
  if (state.kabaneriAtk.atk55 > 0) hardMin = Math.max(hardMin, 4);
  if (state.kabaneriAtk.atk66 > 0 || state.kabaneriAtk.atk77 > 0) hardMin = Math.max(hardMin, 5);
  if (state.specialDisplay.disp456 > 0) hardMin = Math.max(hardMin, 3);
  if (state.specialDisplay.disp666 > 0) hardMin = Math.max(hardMin, 5);
  if (state.omikuji.shokichi > 0) hardMin = Math.max(hardMin, 1);
  if (state.omikuji.chukichi > 0) hardMin = Math.max(hardMin, 3);
  if (state.omikuji.daikichi > 0) hardMin = Math.max(hardMin, 5);
  if (state.voices.mumei_special > 0) hardMin = Math.max(hardMin, 1);
  if (state.voices.no_voice > 0) hardMin = Math.max(hardMin, 4);
  if (state.stEndScreens.mizugi > 0) hardMin = Math.max(hardMin, 5);
  if (state.charas.biba > 0) hardMin = Math.max(hardMin, 3);
  if (hardMin > 0) {
    hasAnyData = true;
    for (let i = 0; i < hardMin; i++) logLik[i] = -Infinity;
  }

  // ════════════════════════════════════════════════════════
  // C. 演出比率系 (soft evidence)
  // ════════════════════════════════════════════════════════

  // ── C1. ボイス奇偶 (male vs female のみで二項計算) ──
  // 実戦値: 設1 male37.1%/female51.7%, 設6 male33.7%/female46.2%
  // (残りは景之系+特殊。male+femaleの中での比率に変換)
  // 設1: male/(male+female) = 37.1/(37.1+51.7) = 41.8%
  // 設6: male/(male+female) = 33.7/(33.7+46.2) = 42.2%
  // → 差が小さい。奇偶の理論値を使用:
  //   奇数(1,3,5): male寄り ~48-52%, 偶数(2,4,6): female寄り ~38-42%
  const mfVoiceTotal = state.voices.male + state.voices.female;
  if (mfVoiceTotal >= 5) {
    hasAnyData = true;
    // male/(male+female) の設定別理論比率
    const voiceMaleRatios = [0.50, 0.42, 0.50, 0.42, 0.50, 0.42];
    const {
      h,
      t
    } = dampen(state.voices.male, mfVoiceTotal, 200);
    voiceMaleRatios.forEach((mr, i) => {
      logLik[i] += binomialLogLik(h, t, mr);
    });
  }

  // ── C2. 景之ボイス出現率 (totalVoice中の比率で二項計算) ──
  const totalVoice = Object.values(state.voices).reduce((a, b) => a + b, 0);
  if (totalVoice >= 5) {
    // 景之(弱): 設1 10.3%, 設6 17.2%
    const kagenoWeakRates = [0.103, 0.110, 0.120, 0.135, 0.150, 0.172];
    const kwCount = state.voices.kageno_weak;
    if (kwCount > 0 || totalVoice >= 20) {
      const {
        h,
        t
      } = dampen(kwCount, totalVoice, 300);
      kagenoWeakRates.forEach((r, i) => {
        logLik[i] += binomialLogLik(h, t, r);
      });
    }

    // 景之(中): 設1 0.9%, 設6 1.8%
    const kmCount = state.voices.kageno_mid;
    if (kmCount > 0) {
      hasAnyData = true;
      const kagenoMidRates = [0.009, 0.010, 0.011, 0.013, 0.015, 0.018];
      const {
        h,
        t
      } = dampen(kmCount, totalVoice, 300);
      kagenoMidRates.forEach((r, i) => {
        logLik[i] += binomialLogLik(h, t, r);
      });
    }

    // 景之(強): 設1 出現せず(≒0.1%), 設6 0.6%
    const ksCount = state.voices.kageno_strong;
    if (ksCount > 0) {
      hasAnyData = true;
      const kagenoStrongRates = [0.001, 0.001, 0.002, 0.003, 0.004, 0.006];
      const {
        h,
        t
      } = dampen(ksCount, totalVoice, 300);
      kagenoStrongRates.forEach((r, i) => {
        logLik[i] += binomialLogLik(h, t, r);
      });
    }
  }

  // ── C3. キャラ紹介 奇偶 (male vs female で二項計算) ──
  // 公式: 設定1=男女1:1, 偶数=女性多め, 奇数(3,5)=男性多め
  // female/(male+female) の設定別理論比率
  const mfCharaTotal = state.charas.male_chara + state.charas.female_chara;
  if (mfCharaTotal >= 5) {
    hasAnyData = true;
    const charaFemaleRatios = [0.50, 0.58, 0.45, 0.58, 0.45, 0.61];
    const {
      h,
      t
    } = dampen(state.charas.female_chara, mfCharaTotal, 200);
    charaFemaleRatios.forEach((fr, i) => {
      logLik[i] += binomialLogLik(h, t, fr);
    });
  }

  // ── C4. ST終了画面 (花見出現率で二項計算) ──
  // 実戦値: 設1 花見3.5%, 設6 花見4.8%
  const totalScreens = Object.values(state.stEndScreens).reduce((a, b) => a + b, 0);
  if (totalScreens >= 3) {
    hasAnyData = true;
    const hanamiRates = [0.035, 0.037, 0.039, 0.042, 0.045, 0.048];
    const {
      h,
      t
    } = dampen(state.stEndScreens.hanami, totalScreens, 200);
    hanamiRates.forEach((r, i) => {
      logLik[i] += binomialLogLik(h, t, r);
    });
  }

  // ── C5. アイテムくじ 菖蒲の弓出現率 (二項計算) ──
  // 実戦値: 設1 3.6%, 設6 13.4% → 大差あり
  const totalOmikuji = Object.values(state.omikuji).reduce((a, b) => a + b, 0);
  if (totalOmikuji >= 3) {
    hasAnyData = true;
    const ayameRates = [0.036, 0.045, 0.055, 0.075, 0.100, 0.134];
    const {
      h,
      t
    } = dampen(state.omikuji.ayame_yumi, totalOmikuji, 200);
    ayameRates.forEach((r, i) => {
      logLik[i] += binomialLogLik(h, t, r);
    });
  }

  // ミヤマカラスアゲハ出現率: 設1 出現せず(≒0.5%), 設6 1.8%
  if (totalOmikuji >= 3 && state.omikuji.miyama > 0) {
    hasAnyData = true;
    const miyamaRates = [0.005, 0.006, 0.008, 0.010, 0.014, 0.018];
    const {
      h,
      t
    } = dampen(state.omikuji.miyama, totalOmikuji, 200);
    miyamaRates.forEach((r, i) => {
      logLik[i] += binomialLogLik(h, t, r);
    });
  }

  // ── C6. 3周期目ボーナス当選率 (短縮なし / 短縮あり を分離) ──
  // 実戦値(短縮なし): 設1 0%(0/5), 設6 33.3%(1/3) → 大きな設定差
  // 実戦値(短縮あり): 設1 50.0%(4/8), 設6 66.7%(2/3) → 短縮時は全体的に高め
  // 解析情報「低設定はかなり抑えられている」

  // 短縮なし: 低設定でほぼ当選しない → 設定差大
  const cycle3NormalTotal = state.cycleBonus.cycle3_normal_hit + state.cycleBonus.cycle3_normal_miss;
  if (cycle3NormalTotal >= 1) {
    hasAnyData = true;
    const cycle3NormalRates = [0.05, 0.10, 0.15, 0.25, 0.35, 0.45];
    cycle3NormalRates.forEach((r, i) => {

      pct: 16.7

    setting: i + 1,
    score: lik,
    pct: parseFloat((lik / totalLik * 100).toFixed(1))
  }));
}

  const c3sHit = state.cycleBonus.cycle3_short_hit;
  const c3sMiss = state.cycleBonus.cycle3_short_miss;
  if (c3nHit + c3nMiss + c3sHit + c3sMiss > 0) {
    lines.push(`── 3周期目ボーナス ──`);
    if (c3nHit + c3nMiss > 0) lines.push(`  短縮なし: ${c3nHit}/${c3nHit + c3nMiss} (${(c3nHit / (c3nHit + c3nMiss) * 100).toFixed(1)}%)`);
    if (c3sHit + c3sMiss > 0) lines.push(`  短縮あり: ${c3sHit}/${c3sHit + c3sMiss} (${(c3sHit / (c3sHit + c3sMiss) * 100).toFixed(1)}%)`);
    lines.push(``);

    lines.push(`── メモ ──`);
    lines.push(state.memo.trim());

  }
  lines.push(`━━━━━━━━━━━━━━━━━━`);
  return lines.join("\n");
}
